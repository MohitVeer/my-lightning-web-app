<!doctype html>
<html lang="en">

  <style>body { font-family: "Salesforce Sans", "Inter", -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; background: #F3F3F3; color: #181818; margin: 0; }</style>

<body class="slds-scope">

    </ol></nav>
    </div>
    <div class="slds-size_1-of-1" data-node-id="lqx7wsvv">
    <article class="slds-card">
      <div class="slds-card__header slds-grid">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
          <div class="slds-media__body"><h2 class="slds-card__header-title">Opportunities</h2><p class="slds-text-body_small slds-text-color_weak">3 items</p></div>

          <ul class="slds-tabs_default__nav" role="tablist">

        </div>

    </article>
    </div>
    <div class="slds-m-top_small slds-m-bottom_x-small" data-node-id="8pns9m2f">
    <button class="slds-button slds-button_neutral" onclick="document.querySelector('[data-node-id=\'o755rcgs\']')?.scrollIntoView({behavior:'smooth',block:'center'})">Button</button>
    </div>
    <div class="slds-size_1-of-1" data-node-id="o755rcgs">

        <header class="slds-modal__header"><h1 id="modal-h" class="slds-modal__title slds-hyphenate">New Opportunity</h1></header>
        <div class="slds-modal__content slds-p-around_medium">Fill in the required fields below.</div>
        <footer class="slds-modal__footer"><button class="slds-button slds-button_neutral">Cancel</button><button class="slds-button slds-button_brand">Save</button></footer>
      </div>
    </section>
